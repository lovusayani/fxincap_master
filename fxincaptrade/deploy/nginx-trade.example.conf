# Example: static trade UI on trade.example.com with API on api.example.com
#
# Option A — Build the SPA with VITE_API_URL=https://api.example.com (recommended).
#   Browser calls the API directly; you only need to serve dist/spa and handle TLS.
#   Ensure fxincapapi CORS allows https://trade.example.com (default cors() is permissive).
#
# Option B — Same-origin /api: build WITHOUT VITE_API_URL and proxy /api to the API server:

server {
    listen 443 ssl http2;
    server_name trade.example.com;

    root /var/www/fxincaptrade/dist/spa;
    index index.html;

    location /api/ {
        proxy_pass https://api.example.com;
        proxy_http_version 1.1;
        proxy_set_header Host api.example.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
