name: CI/CD Staging (Dev Branch)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

concurrency:
  group: deploy-staging-dev
  cancel-in-progress: true

env:
  DEPLOY_ENV: staging
  NODE_ENV: staging

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            fxincap/pnpm-lock.yaml
            fxincapadmin/pnpm-lock.yaml
            fxincapapi/pnpm-lock.yaml
            fxincaptrade/pnpm-lock.yaml
            fxincapws/pnpm-lock.yaml

      - name: Install dependencies (all projects)
        shell: bash
        run: |
          set -euo pipefail
          for dir in fxincap fxincapadmin fxincapapi fxincaptrade fxincapws; do
            if [ -d "$dir" ]; then
              echo "Installing $dir"
              (cd "$dir" && pnpm install --frozen-lockfile)
            else
              echo "Missing directory: $dir"
              exit 1
            fi
          done

      - name: Lint (non-blocking on staging)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          for dir in fxincap fxincaptrade; do
            if [ -f "$dir/package.json" ]; then
              if [ "$dir" = "fxincap" ]; then
                echo "Linting $dir with eslint"
                (cd "$dir" && pnpm exec eslint .) || echo "Lint failed in $dir, continuing"
              elif node -e "const p=require('./$dir/package.json'); process.exit(p.scripts&&p.scripts.lint?0:1)"; then
                echo "Linting $dir"
                (cd "$dir" && pnpm lint) || echo "Lint failed in $dir, continuing"
              else
                echo "No lint script in $dir, skipping"
              fi
            fi
          done

      - name: Build projects
        shell: bash
        run: |
          set -euo pipefail
          for dir in fxincap fxincapapi fxincaptrade; do
            if node -e "const p=require('./$dir/package.json'); process.exit(p.scripts&&p.scripts.build?0:1)"; then
              echo "Building $dir"
              (cd "$dir" && pnpm build)
            else
              echo "No build script in $dir"
              exit 1
            fi
          done
          echo "Building fxincapadmin/client"
          (cd fxincapadmin/client && pnpm build)
          echo "fxincapws: no build step expected"

  deploy-staging:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY_STAGING }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_STAGING }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync code to staging
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_STAGING }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER_STAGING }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_STAGING }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.git' \
            --exclude='**/node_modules' \
            --exclude='**/.env' \
            --exclude='**/.env.local' \
            --exclude='fxincapapi/uploads/deposit-screenshots/**' \
            --exclude='fxincapapi/uploads/kyc-documents/**' \
            --exclude='fxincapapi/uploads/profile-pictures/**' \
            --exclude='fxincaptrade/uploads/profile-pictures/**' \
            --exclude='**/.next' \
            --exclude='**/dist' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Install, build, and reload PM2 (staging)
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_STAGING }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER_STAGING }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_STAGING }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          mkdir -p "$DEPLOY_PATH/logs"

          for dir in fxincap fxincapadmin fxincapapi fxincaptrade fxincapws; do
            echo "Installing $dir"
            (cd "$dir" && pnpm install --frozen-lockfile)
          done

          for dir in fxincap fxincapapi fxincaptrade; do
            if node -e "const p=require('./$dir/package.json'); process.exit(p.scripts&&p.scripts.build?0:1)"; then
              echo "Building $dir"
              (cd "$dir" && pnpm build)
            fi
          done

          echo "Building fxincapadmin/client"
          (cd fxincapadmin/client && pnpm build)

          pm2 delete fxincap-app 2>/dev/null || true
          pm2 startOrReload ecosystem.staging.config.cjs --env staging --update-env

          pm2 save
          pm2 status
          if pm2 status | grep -q "errored"; then
            echo "One or more PM2 apps are errored"
            exit 1
          fi
          EOF

      - name: Staging deployment summary
        run: echo "Staging deployment successful"
