name: CI/CD Production (Main Branch)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production-main
  cancel-in-progress: true

env:
  DEPLOY_ENV: production
  NODE_ENV: production

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            fxincap/pnpm-lock.yaml
            fxincapadmin/pnpm-lock.yaml
            fxincapapi/pnpm-lock.yaml
            fxincaptrade/pnpm-lock.yaml
            fxincapws/pnpm-lock.yaml

      - name: Install dependencies (all projects)
        shell: bash
        run: |
          set -euo pipefail
          for dir in fxincap fxincapadmin fxincapapi fxincaptrade fxincapws; do
            if [ -d "$dir" ]; then
              echo "Installing $dir"
              (cd "$dir" && pnpm install --frozen-lockfile)
            else
              echo "Missing directory: $dir"
              exit 1
            fi
          done

      - name: Lint (strict)
        shell: bash
        run: |
          set -euo pipefail
          for dir in fxincap fxincaptrade; do
            if [ "$dir" = "fxincap" ]; then
              echo "Linting $dir with eslint"
              (cd "$dir" && pnpm exec eslint .)
            elif node -e "const p=require('./$dir/package.json'); process.exit(p.scripts&&p.scripts.lint?0:1)"; then
              echo "Linting $dir"
              (cd "$dir" && pnpm lint)
            else
              echo "No lint script in $dir"
              exit 1
            fi
          done

      - name: Build projects (strict)
        shell: bash
        run: |
          set -euo pipefail
          for dir in fxincap fxincapadmin fxincapapi fxincaptrade; do
            if node -e "const p=require('./$dir/package.json'); process.exit(p.scripts&&p.scripts.build?0:1)"; then
              echo "Building $dir"
              (cd "$dir" && pnpm build)
            else
              echo "No build script in $dir"
              exit 1
            fi
          done
          echo "fxincapws: no build step expected"

  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY_PROD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_PROD }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync code to production
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_PROD }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER_PROD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_PROD }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.git' \
            --exclude='**/node_modules' \
            --exclude='**/.env' \
            --exclude='**/.env.local' \
            --exclude='fxincapapi/uploads/deposit-screenshots/**' \
            --exclude='fxincapapi/uploads/kyc-documents/**' \
            --exclude='fxincapapi/uploads/profile-pictures/**' \
            --exclude='fxincaptrade/uploads/profile-pictures/**' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Install, build, and reload PM2 (production)
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_PROD }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER_PROD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_PROD }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' bash -se" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          for dir in fxincap fxincapadmin fxincapapi fxincaptrade fxincapws; do
            echo "Installing $dir"
            (cd "$dir" && pnpm install --frozen-lockfile)
          done

          for dir in fxincap fxincapadmin fxincapapi fxincaptrade; do
            if node -e "const p=require('./$dir/package.json'); process.exit(p.scripts&&p.scripts.build?0:1)"; then
              echo "Building $dir"
              (cd "$dir" && pnpm build)
            fi
          done

          if [ -f ecosystem.production.config.cjs ]; then
            pm2 startOrReload ecosystem.production.config.cjs --env production
          elif [ -f ecosystem.production.config.js ]; then
            pm2 startOrReload ecosystem.production.config.js --env production
          elif [ -f ecosystem.config.cjs ]; then
            pm2 startOrReload ecosystem.config.cjs --env production
          elif [ -f ecosystem.config.js ]; then
            pm2 startOrReload ecosystem.config.js --env production
          else
            started=0
            for file in \
              fxincap/ecosystem.config.js \
              fxincapadmin/ecosystem.config.cjs \
              fxincapapi/ecosystem.config.cjs \
              fxincaptrade/ecosystem.config.cjs \
              fxincapws/ecosystem.config.cjs \
              fxincapws/ecosystem.config.js; do
              if [ -f "$file" ]; then
                pm2 startOrReload "$file" --env production
                started=1
              fi
            done
            if [ "$started" -eq 0 ]; then
              echo "Missing production ecosystem file in $DEPLOY_PATH"
              exit 1
            fi
          fi

          pm2 save
          pm2 status
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Production Release v${{ github.run_number }}
          body: |
            Production deployment from commit ${{ github.sha }}

            Apps:
            - fxincap
            - fxincapadmin
            - fxincapapi
            - fxincaptrade
            - fxincapws
          draft: false
          prerelease: false

      - name: Production deployment summary
        run: echo "Production deployment successful"
